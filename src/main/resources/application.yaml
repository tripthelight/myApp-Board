spring:
  application:
    name: myapp-board
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${BOARD_DB_URL:jdbc:mariadb://myapp-mariadb:3306/myapp_board?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${BOARD_DB_USERNAME:root}
    password: ${BOARD_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  shutdown: graceful
  env: ${APP_COLOR:local}
  serverAddress: ${DISPLAY_SERVER_ADDRESS:127.0.0.1}

serverName: ${SERVER_NAME:local_server}

app:
  color: ${APP_COLOR:local}
