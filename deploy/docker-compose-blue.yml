name: myapp-board-blue

services:
  board-blue-1:
    image: ${IMAGE_NAME:?IMAGE_NAME is required}:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: myapp-board-blue-1
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      APP_COLOR: blue
      SERVER_NAME: board_blue_1
      DISPLAY_SERVER_ADDRESS: myapp-board-blue-1
      SERVER_PORT: 8080
      BOARD_DB_PASSWORD: ${BOARD_DB_PASSWORD:?BOARD_DB_PASSWORD is required}
    expose:
      - "8080"
    networks:
      - myapp-network

  board-blue-2:
    image: ${IMAGE_NAME:?IMAGE_NAME is required}:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: myapp-board-blue-2
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      APP_COLOR: blue
      SERVER_NAME: board_blue_2
      DISPLAY_SERVER_ADDRESS: myapp-board-blue-2
      SERVER_PORT: 8080
      BOARD_DB_PASSWORD: ${BOARD_DB_PASSWORD:?BOARD_DB_PASSWORD is required}
    expose:
      - "8080"
    networks:
      - myapp-network

networks:
  myapp-network:
    external: true
    name: myapp-network
