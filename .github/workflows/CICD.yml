name: Build and blue-green deploy Board

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: myapp-board-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, myapp-board]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify deployment environment
        run: |
          docker version
          docker compose version
          docker network inspect myapp-network >/dev/null
          docker inspect myapp-nginx >/dev/null

      - name: Write pre-deployment checklist
        shell: bash
        run: |
          {
            echo "## Board pre-deployment checklist"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Docker command | PASS |"
            echo "| Docker Compose v2 | PASS |"
            echo "| Docker network \`myapp-network\` | PASS |"
            echo "| Nginx container \`myapp-nginx\` | PASS |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and deploy without downtime
        id: deploy
        env:
          IMAGE_NAME: myapp-board
          IMAGE_TAG: ${{ github.sha }}
          MYAPP_INFRA_DIR: /home/um/myApp-Infra
          DEPLOY_LOG_DIR: /home/um/myapp-deploy-logs/board
          DRAIN_SECONDS: '10'
          STABILIZATION_SECONDS: '30'
          CHECK_INTERVAL_SECONDS: '2'
        run: |
          chmod +x mvnw scripts/*.sh
          ./scripts/deploy-local.sh

      - name: Collect post-deployment evidence
        if: always()
        id: evidence
        continue-on-error: true
        shell: bash
        run: |
          set +e

          health_response="$(docker exec myapp-nginx \
            wget -q -T 2 -O - http://127.0.0.1/board/hc 2>&1)"
          health_status="$?"

          containers="$(docker ps \
            --filter 'name=myapp-board-' \
            --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' 2>&1)"

          {
            echo "health_status=$health_status"
            echo "health_response<<EOF"
            printf '%s\n' "$health_response"
            echo "EOF"
            echo "containers<<EOF"
            printf '%s\n' "$containers"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        if: always()
        shell: bash
        env:
          DEPLOY_STATUS: ${{ steps.deploy.outputs.deployment_status }}
          PREVIOUS_COLOR: ${{ steps.deploy.outputs.previous_color }}
          TARGET_COLOR: ${{ steps.deploy.outputs.target_color }}
          DEPLOY_LOG_FILE: ${{ steps.deploy.outputs.log_file }}
          HEALTH_STATUS: ${{ steps.evidence.outputs.health_status }}
          HEALTH_RESPONSE: ${{ steps.evidence.outputs.health_response }}
          RUNNING_CONTAINERS: ${{ steps.evidence.outputs.containers }}
        run: |
          if [ "${HEALTH_STATUS:-1}" = "0" ]; then
            HEALTH_RESULT="PASS"
          else
            HEALTH_RESULT="WARN"
          fi

          if [ -n "${DEPLOY_LOG_FILE:-}" ]; then
            LOG_RESULT="PASS"
          else
            LOG_RESULT="WARN"
          fi

          {
            echo "## Board deployment"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Result | ${DEPLOY_STATUS:-FAILED} |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Actor | \`${GITHUB_ACTOR}\` |"
            echo "| Transition | \`${PREVIOUS_COLOR:-unknown} -> ${TARGET_COLOR:-unknown}\` |"
            echo "| Server log | \`${DEPLOY_LOG_FILE:-not-created}\` |"
            echo
            echo "### Automated checklist"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Deployment script | \`${DEPLOY_STATUS:-FAILED}\` |"
            echo "| Proxy health \`/board/hc\` | \`$HEALTH_RESULT\` |"
            echo "| Deployment log path captured | \`$LOG_RESULT\` |"
            echo
            echo "### Proxy response"
            echo
            echo '```json'
            printf '%s\n' "${HEALTH_RESPONSE:-not-collected}"
            echo '```'
            echo
            echo "### Running Board containers"
            echo
            echo '```text'
            printf '%s\n' "${RUNNING_CONTAINERS:-not-collected}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack deployment notification
        if: always()
        continue-on-error: true
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ steps.deploy.outputs.deployment_status }}
          PREVIOUS_COLOR: ${{ steps.deploy.outputs.previous_color }}
          TARGET_COLOR: ${{ steps.deploy.outputs.target_color }}
          DEPLOY_LOG_FILE: ${{ steps.deploy.outputs.log_file }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping Slack notification."
            exit 0
          fi

          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            RESULT="SUCCESS"
          else
            RESULT="FAILED"
          fi

          payload=$(printf '{"text":"[myApp-Board] Deployment %s\\nTransition: %s -> %s\\nCommit: %s\\nActor: %s\\nActions: %s/%s/actions/runs/%s\\nServer log: %s"}' \
            "$RESULT" \
            "${PREVIOUS_COLOR:-unknown}" \
            "${TARGET_COLOR:-unknown}" \
            "$GITHUB_SHA" \
            "$GITHUB_ACTOR" \
            "$GITHUB_SERVER_URL" \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_RUN_ID" \
            "${DEPLOY_LOG_FILE:-not-created}")

          curl --fail-with-body --silent --show-error \
            --retry 3 \
            --max-time 10 \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Upload deployment log
        if: always() && steps.deploy.outputs.log_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: board-deploy-log-${{ github.run_id }}
          path: ${{ steps.deploy.outputs.log_file }}
          if-no-files-found: warn
          retention-days: 30
