name: myApp Board CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set execute permission
        run: chmod +x mvnw scripts/*.sh

      - name: Build & Deploy
        id: deploy
        run: |
          set +e

          echo "[1/8] Build Spring Boot application"
          ./mvnw clean package -DskipTests
          if [ $? -ne 0 ]; then
            echo "BUILD FAILED"
            exit 1
          fi

          echo "[2/8] Build Docker image"
          IMAGE=myapp-board:${GITHUB_SHA}
          docker build -t $IMAGE .

          echo "[3/8] Start new containers (blue-green)"
          ./scripts/deploy.sh $IMAGE

          echo "[4/8] Health check"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/board/hc || echo "500")

          if [ "$STATUS" != "200" ]; then
            echo "❌ HEALTH CHECK FAILED"

            FAIL=1
          else
            echo "✔ HEALTH CHECK OK"
            FAIL=0
          fi

          echo "[5/8] Stabilization check (30s)"
          for i in {1..15}; do
            sleep 2

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/board/hc || echo "FAIL")

            if [ "$STATUS" != "200" ]; then
              FAIL=1
              break
            fi

            echo "Stabilization check $i/15: OK"
          done

          echo "[6/8] DECISION PHASE"

          if [ "$FAIL" -eq 1 ]; then
            echo "🔥 FAILURE DETECTED → START ROLLBACK"

            # ===== ROLLBACK LOGIC =====
            ./scripts/switch-board-upstream.sh blue

            docker rm -f myapp-board-green-1 || true
            docker rm -f myapp-board-green-2 || true

            echo "✔ ROLLBACK COMPLETE"

            echo "❌ FAIL END"
            exit 1
          fi

          echo "[7/8] Commit new version active"

          ./scripts/cleanup-old.sh

          echo "[8/8] SUCCESS DEPLOY COMPLETE"