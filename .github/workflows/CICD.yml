name: Build and blue-green deploy Board

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_test:
        description: Run a controlled failure after the Nginx switch
        required: true
        default: none
        type: choice
        options:
          - none
          - after-switch

concurrency:
  group: myapp-board-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, myapp-board]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify deployment environment
        run: |
          docker version
          docker compose version
          docker network inspect myapp-network >/dev/null
          docker inspect myapp-nginx >/dev/null

      - name: Build and deploy without downtime
        id: deploy
        continue-on-error: ${{ inputs.rollback_test == 'after-switch' }}
        env:
          IMAGE_NAME: myapp-board
          IMAGE_TAG: ${{ github.sha }}
          MYAPP_INFRA_DIR: /home/um/myApp-Infra
          DEPLOY_LOG_DIR: /home/um/myapp-deploy-logs/board
          DRAIN_SECONDS: '10'
          STABILIZATION_SECONDS: '30'
          CHECK_INTERVAL_SECONDS: '2'
          ROLLBACK_TEST_AFTER_SWITCH: ${{ inputs.rollback_test == 'after-switch' }}
        run: |
          chmod +x mvnw scripts/*.sh
          ./scripts/deploy-local.sh

      - name: Verify automatic rollback
        id: rollback
        if: always() && inputs.rollback_test == 'after-switch'
        shell: bash
        env:
          PREVIOUS_COLOR: ${{ steps.deploy.outputs.previous_color }}
          TARGET_COLOR: ${{ steps.deploy.outputs.target_color }}
        run: |
          if [ "${{ steps.deploy.outcome }}" != "failure" ]; then
            echo "The controlled deployment unexpectedly succeeded." >&2
            exit 1
          fi

          response=$(docker exec myapp-nginx \
            wget -q -T 2 -O - http://127.0.0.1/board/hc)

          if ! grep -Fq "\"env\":\"$PREVIOUS_COLOR\"" <<< "$response"; then
            echo "Rollback verification failed: $response" >&2
            exit 1
          fi

          running_target=$(docker ps \
            --filter "name=myapp-board-$TARGET_COLOR-" \
            --format '{{.Names}}')

          if [ -n "$running_target" ]; then
            echo "Failed target containers are still running:" >&2
            echo "$running_target" >&2
            exit 1
          fi

          echo "Automatic rollback verified: $TARGET_COLOR -> $PREVIOUS_COLOR"
          echo "Proxy response: $response"

      - name: Write deployment summary
        if: always()
        shell: bash
        env:
          DEPLOY_STATUS: ${{ steps.deploy.outputs.deployment_status }}
          PREVIOUS_COLOR: ${{ steps.deploy.outputs.previous_color }}
          TARGET_COLOR: ${{ steps.deploy.outputs.target_color }}
          DEPLOY_LOG_FILE: ${{ steps.deploy.outputs.log_file }}
          ROLLBACK_TEST: ${{ inputs.rollback_test }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
        run: |
          DISPLAY_RESULT="${DEPLOY_STATUS:-FAILED}"
          if [ "$ROLLBACK_TEST" = "after-switch" ] && [ "$ROLLBACK_OUTCOME" = "success" ]; then
            DISPLAY_RESULT="ROLLBACK TEST PASSED"
          fi

          {
            echo "## Board deployment"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Result | $DISPLAY_RESULT |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Actor | \`${GITHUB_ACTOR}\` |"
            echo "| Transition | \`${PREVIOUS_COLOR:-unknown} -> ${TARGET_COLOR:-unknown}\` |"
            echo "| Server log | \`${DEPLOY_LOG_FILE:-not-created}\` |"
            if [ "$ROLLBACK_TEST" = "after-switch" ]; then
              echo "| Rollback test | \`${ROLLBACK_OUTCOME}\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack deployment notification
        if: always()
        continue-on-error: true
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ steps.deploy.outputs.deployment_status }}
          PREVIOUS_COLOR: ${{ steps.deploy.outputs.previous_color }}
          TARGET_COLOR: ${{ steps.deploy.outputs.target_color }}
          DEPLOY_LOG_FILE: ${{ steps.deploy.outputs.log_file }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          ROLLBACK_TEST: ${{ inputs.rollback_test }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured. Skipping Slack notification."
            exit 0
          fi

          if [ "$ROLLBACK_TEST" = "after-switch" ] && [ "$ROLLBACK_OUTCOME" = "success" ]; then
            RESULT="ROLLBACK TEST PASSED"
          elif [ "$DEPLOY_OUTCOME" = "success" ]; then
            RESULT="SUCCESS"
          else
            RESULT="FAILED"
          fi

          payload=$(printf '{"text":"[myApp-Board] Deployment %s\\nTransition: %s -> %s\\nCommit: %s\\nActor: %s\\nActions: %s/%s/actions/runs/%s\\nServer log: %s"}' \
            "$RESULT" \
            "${PREVIOUS_COLOR:-unknown}" \
            "${TARGET_COLOR:-unknown}" \
            "$GITHUB_SHA" \
            "$GITHUB_ACTOR" \
            "$GITHUB_SERVER_URL" \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_RUN_ID" \
            "${DEPLOY_LOG_FILE:-not-created}")

          curl --fail-with-body --silent --show-error \
            --retry 3 \
            --max-time 10 \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Upload deployment log
        if: always() && steps.deploy.outputs.log_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: board-deploy-log-${{ github.run_id }}
          path: ${{ steps.deploy.outputs.log_file }}
          if-no-files-found: warn
          retention-days: 30
