name: myApp-Board CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    env:
      MYAPP_INFRA_DIR: /home/um/myApp-Infra
      DRAIN_SECONDS: 10
      STABILIZATION_SECONDS: 30
      CHECK_INTERVAL_SECONDS: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x mvnw
          chmod +x scripts/*.sh

      - name: Build & Package
        run: |
          ./mvnw clean package -DskipTests

      - name: Build Docker Image
        run: |
          IMAGE=myapp-board:${GITHUB_SHA}
          docker build -t $IMAGE .

      - name: Deploy (Blue-Green + Rollback)
        run: |
          IMAGE=myapp-board:${GITHUB_SHA}

          set +e

          echo "[1/6] Deploy"
          ./scripts/deploy-local.sh $IMAGE
          DEPLOY_EXIT=$?

          echo "[2/6] Health Check"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/board/hc || echo "500")

          if [ "$STATUS" != "200" ] || [ $DEPLOY_EXIT -ne 0 ]; then
            echo "❌ DEPLOY FAILED → ROLLBACK"

            # 🚨 핵심 수정: promote 제거 → switch로 통일
            "$MYAPP_INFRA_DIR/scripts/switch-board-upstream.sh" blue

            docker rm -f myapp-board-green-1 myapp-board-green-2 || true

            echo "✔ ROLLBACK COMPLETE"
            exit 1
          fi

          echo "[3/6] Stabilization"
          for i in {1..15}; do
            sleep 2
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/board/hc || echo "500")

            if [ "$STATUS" != "200" ]; then
              echo "❌ STABILIZATION FAILED → ROLLBACK"

              "$MYAPP_INFRA_DIR/scripts/switch-board-upstream.sh" blue
              docker rm -f myapp-board-green-1 myapp-board-green-2 || true

              exit 1
            fi

            echo "OK $i/15"
          done

          echo "✔ SUCCESS DEPLOY"