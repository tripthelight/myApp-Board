name: Deploy Board Local

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout board repository
        uses: actions/checkout@v4

      - name: Build board jar
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Build board Docker image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          docker build -t myapp-board:${IMAGE_TAG} .
          docker tag myapp-board:${IMAGE_TAG} myapp-board:latest

      - name: Deploy board with new image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          cd /home/um/myApp-Infra
          BOARD_IMAGE_TAG="${IMAGE_TAG}" ./scripts/deploy-board.sh
